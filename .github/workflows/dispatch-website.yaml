name: Dispatch Website Build

on:
  push:
    paths: ['website/**']
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger website build in private repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          repository: openova-io/openova-private
          event-type: website-updated
