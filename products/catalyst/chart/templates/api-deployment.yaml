apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalyst-api
  labels:
    app.kubernetes.io/name: catalyst-api
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: catalyst-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalyst-api
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: catalyst-api
          image: ghcr.io/openova-io/openova/catalyst-api:333b859
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: CORS_ORIGIN
              value: "https://catalyst.openova.io"
            - name: DYNADOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dynadot-api-credentials
                  key: api-key
            - name: DYNADOT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: dynadot-api-credentials
                  key: api-secret
            # Comma-separated allowlist of pool domains the catalyst-api may
            # write DNS records for via the Dynadot API. Adding a new pool
            # domain to production is a secret edit, not a code change. Falls
            # back to the legacy `domain` key (single domain) if missing, and
            # then to the package's built-in defaults (openova.io,omani.works)
            # for dev workstations. See products/catalyst/bootstrap/api/internal/dynadot/dynadot.go.
            - name: DYNADOT_MANAGED_DOMAINS
              valueFrom:
                secretKeyRef:
                  name: dynadot-api-credentials
                  key: managed-domains
                  optional: true
            - name: DYNADOT_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: dynadot-api-credentials
                  key: domain
                  optional: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            # readOnlyRootFilesystem deliberately false: the bootstrap installer
            # writes kubeconfig temp files (mode 0600) under /tmp and helm
            # downloads chart caches under $HOME. Per Catalyst security policy
            # these writes are scoped via emptyDir below, never to the image's
            # actual root FS.
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 65534
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: home
              mountPath: /home/nonroot
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
        - name: home
          emptyDir:
            sizeLimit: 256Mi
