apiVersion: apps/v1
kind: Deployment
metadata:
  name: console
  namespace: sme
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sme-console
  template:
    metadata:
      labels:
        app: sme-console
    spec:
      serviceAccountName: console
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: console
          image: ghcr.io/openova-io/openova/console:008d65d
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001
---
apiVersion: v1
kind: Service
metadata:
  name: console
  namespace: sme
spec:
  selector:
    app: sme-console
  ports:
    - port: 8080
      targetPort: 8080
