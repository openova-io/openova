<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>OpenOva — Provisioning DAG</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<!--
  Provisioning DAG — dynamic, SSE-driven view.

  Per docs/INVIOLABLE-PRINCIPLES.md #1 (waterfall is the contract — every
  deliverable in target-state shape) and #4 (never hardcode), this page no
  longer ships any component lists, region-pair mocks, or "Waiting for Flux..."
  copy. Every bubble is computed at runtime from:

    1. window.CATALYST_CATALOG — emitted by scripts/build-catalog.mjs from the
       monorepo's platform/<name>/blueprint.yaml + clusters/_template/
       bootstrap-kit/. Single source of truth for both the React wizard's
       StepComponents grid and this static page.
    2. localStorage('openova-catalyst-wizard') — the wizard's persisted zustand
       store. Provides deploymentId + selectedComponents (the operator's
       choice) at run time.
    3. The catalyst-api SSE stream at <BASE>api/v1/deployments/<id>/logs.

  The DAG = one Hetzner-infra supernode → one Flux-bootstrap supernode →
  bootstrap-kit Blueprints in numerical install order → user-selected
  Blueprints with transitive hard deps expanded. Phase events from the SSE
  stream (tofu-init|tofu-plan|tofu-apply|tofu-output|flux-bootstrap) drive
  the bubble state machine. Raw `tofu` stdout/stderr lines stream into the
  log panel + the currently-running bubble's expandable detail; the four
  hcloud_* resource markers (network, firewall, server, load_balancer)
  advance the Hetzner-infra supernode's internal sub-progress.

  Per-component states beyond `flux-bootstrap` are NOT emitted by the current
  catalyst-api — the bootstrap-kit Blueprints reconcile inside the new
  cluster via Flux Kustomizations. The follow-on path is for catalyst-api
  to watch those Kustomizations and emit per-Blueprint events on the same
  SSE stream; this page is already shaped to consume that, see
  applyEvent() — unknown phases beyond flux-bootstrap match by Blueprint
  id and flip that bubble to running.
-->
<style>
:root{--bg:radial-gradient(ellipse at 20% 10%,#0b1c3a 0%,#070a12 75%);--s1:rgba(255,255,255,.04);--s2:rgba(255,255,255,.07);--bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.14);--hi:rgba(255,255,255,.92);--md:rgba(255,255,255,.65);--lo:rgba(255,255,255,.40);--hint:rgba(255,255,255,.22);--acc:#38BDF8;--accd:rgba(56,189,248,.10);--log:rgba(2,6,15,.75);--ok:#4ADE80;--warn:#FBBF24;--err:#F87171}
[data-theme=light]{--bg:radial-gradient(ellipse at 20% 10%,#dbeafe 0%,#f0f9ff 75%);--s1:#fff;--s2:#f8fafc;--bd:#e2e8f0;--bd2:#cbd5e1;--hi:#0f172a;--md:#334155;--lo:#475569;--hint:#94a3b8;--acc:#0284c7;--accd:rgba(2,132,199,.08);--log:#f8fafc}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;font-size:13px;background:var(--bg);color:var(--md);-webkit-font-smoothing:antialiased}
.page{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{flex-shrink:0;height:48px;display:flex;align-items:center;padding:0 14px;gap:0;background:var(--s1);border-bottom:1px solid var(--bd);backdrop-filter:blur(20px);z-index:50}
.tb-logo{font-size:11px;font-weight:800;letter-spacing:.14em;color:var(--acc);text-transform:uppercase}
.tb-sep{width:1px;height:18px;background:var(--bd);margin:0 12px}
.tb-org{font-size:13px;font-weight:700;color:var(--hi)}.tb-meta{font-size:10px;color:var(--hint);margin-top:1px}
.tb-r{display:flex;align-items:center;gap:8px;margin-left:auto}
.pill{display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;background:var(--accd);border:1px solid rgba(56,189,248,.20)}
.pill.ok{background:rgba(74,222,128,.10);border-color:rgba(74,222,128,.20)}.pill.ok .pdot{background:var(--ok);animation:none}
.pill.err{background:rgba(248,113,113,.10);border-color:rgba(248,113,113,.20)}.pill.err .pdot{background:var(--err);animation:none}
.pdot{width:5px;height:5px;border-radius:50%;background:var(--acc);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.65)}}
.pill-t{font-size:10px;font-weight:600;color:var(--acc)}
.pill.ok .pill-t{color:var(--ok)}.pill.err .pill-t{color:var(--err)}
.prog-w{display:flex;align-items:center;gap:6px}.prog-b{width:100px;height:3px;border-radius:2px;background:var(--bd);overflow:hidden}
.prog-f{height:100%;width:0%;background:linear-gradient(90deg,var(--acc),#818CF8);transition:width .4s}
.prog-p{font-size:11px;font-weight:700;color:var(--acc);min-width:34px;text-align:right}.prog-t{font-size:10px;color:var(--hint);min-width:48px;text-align:right;font-variant-numeric:tabular-nums}
.ibtn{width:26px;height:26px;border-radius:6px;background:var(--bd);border:1px solid var(--bd2);color:var(--lo);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s;text-decoration:none}
.ibtn:hover{background:var(--s2);color:var(--md)}
.ibtn.cta{background:var(--accd);border-color:rgba(56,189,248,.4);color:var(--acc);font-weight:700;padding:0 10px;width:auto;font-size:11px;letter-spacing:.04em}
.body{flex:1;display:flex;overflow:hidden;min-height:0}
/* sidebar */
.sidebar{width:248px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--bd);overflow:hidden;transition:width .28s}
.sidebar.collapsed{width:0}
.sb-in{min-width:248px;display:flex;flex-direction:column;height:100%;overflow-y:auto}
.sb-hdr{font-size:10px;font-weight:700;letter-spacing:.10em;text-transform:uppercase;color:var(--hint);padding:10px 12px 6px}
.sec-row{display:flex;align-items:center;gap:7px;padding:8px 12px 6px;border-top:1px solid var(--bd);cursor:pointer;user-select:none;transition:background .12s}
.sec-row:hover{background:var(--s2)}
.sec-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--bd2)}
.sec-dot.running{background:var(--acc);animation:pulse 1.5s ease-in-out infinite}
.sec-dot.done{background:var(--ok)}.sec-dot.failed{background:var(--err)}
.sec-name{font-size:12px;font-weight:700;color:var(--hi)}
.sec-meta{font-size:9px;color:var(--hint);margin-top:1px}
.sec-badge{font-size:8px;font-weight:700;padding:2px 6px;border-radius:4px;color:var(--acc);background:var(--accd);border:1px solid rgba(56,189,248,.22);flex-shrink:0}
.sec-arr{font-size:9px;color:var(--hint);transition:transform .18s;flex-shrink:0;width:12px;text-align:center}
.sec-arr.open{transform:rotate(90deg)}
.sb-prog{height:2px;border-radius:1px;background:var(--bd);margin:0 12px 5px;overflow:hidden}
.sb-prog-f{height:100%;background:linear-gradient(90deg,var(--acc),#818CF8);transition:width .4s}
.node-rows{overflow:hidden;max-height:0;transition:max-height .22s ease}
.node-rows.open{max-height:9999px}
.n-row{display:flex;align-items:center;gap:6px;padding:4px 12px 4px 28px;cursor:pointer}
.n-row:hover{background:var(--s1)}
.n-row.selected{background:var(--s2)}
.n-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;background:var(--bd2)}
.n-dot.done{background:var(--ok)}.n-dot.running{background:var(--acc);animation:pulse 1.2s ease-in-out infinite}
.n-dot.failed{background:var(--err)}
.n-name{font-size:10px;color:var(--md);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.n-time{font-size:8px;color:var(--hint);flex-shrink:0;font-variant-numeric:tabular-nums}
/* dag */
.dag-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.dag-graph{flex:1;position:relative;overflow:hidden}
#gsvg{width:100%;height:100%;display:block;cursor:default}
#gsvg.dragging{cursor:grabbing}
.nlabel{font-size:10px;font-family:'Inter',sans-serif;font-weight:600;text-anchor:middle;pointer-events:none}
.nsub{font-size:8px;font-family:'Inter',sans-serif;text-anchor:middle;fill:var(--hint);pointer-events:none}
.ng{cursor:grab}
.ng .nhov{fill:none;opacity:0;stroke-width:1.5;transition:opacity .12s;pointer-events:none}
.ng:hover .nhov{opacity:.6}
.ng.selected .nhov{opacity:1}
/* log */
.log-panel{width:340px;flex-shrink:0;display:flex;flex-direction:column;border-left:1px solid var(--bd);background:var(--log);transition:width .28s;overflow:hidden}
.log-panel.collapsed{width:0}
.lp-in{min-width:340px;display:flex;flex-direction:column;height:100%}
.lhdr{display:flex;align-items:center;gap:7px;padding:7px 11px;border-bottom:1px solid var(--bd);flex-shrink:0}
.llbl{font-size:9px;font-weight:700;letter-spacing:.10em;text-transform:uppercase;color:var(--hint)}
.lchip{font-size:9px;font-weight:600;padding:2px 7px;border-radius:4px;color:var(--acc);background:var(--accd);border:1px solid rgba(56,189,248,.18)}
.lstat{margin-left:auto;font-size:9px;color:var(--hint);font-variant-numeric:tabular-nums}
.lstream{flex:1;overflow-y:auto;padding:8px 11px;font-family:'JetBrains Mono',monospace;font-size:9.5px;line-height:1.7}
.ll{display:flex;gap:9px;align-items:flex-start}
.ll-ts{color:var(--hint);flex-shrink:0;font-size:8.5px;min-width:54px}
.ll-msg{flex:1;word-break:break-word;white-space:pre-wrap}
.ll-info .ll-msg{color:rgba(255,255,255,.78)}
.ll-warn .ll-msg{color:var(--warn)}
.ll-error .ll-msg{color:var(--err)}
.ll-meta{font-size:8.5px;color:var(--hint);background:rgba(255,255,255,.04);padding:0 5px;border-radius:3px;margin-right:5px}
.lcur{display:inline-block;width:5px;height:10px;background:var(--acc);margin-left:2px;animation:blink 1.1s step-end infinite;vertical-align:text-bottom}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.lempty{padding:14px;color:var(--hint);font-size:10.5px;line-height:1.6}
@media(max-width:900px){.sidebar{width:0}}@media(max-width:640px){.log-panel{width:0}}
/* hover tooltip */
#tt{position:fixed;pointer-events:none;z-index:200;max-width:300px;padding:10px 13px;background:rgba(6,12,28,.97);border:1px solid rgba(255,255,255,.12);border-radius:10px;backdrop-filter:blur(16px);box-shadow:0 6px 28px rgba(0,0,0,.6);display:none;line-height:1.6}
#tt .ttn{font-size:13px;font-weight:700;color:rgba(255,255,255,.92);margin-bottom:5px}
#tt .ttr{display:flex;justify-content:space-between;gap:10px;margin:2px 0}
#tt .ttk{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.35);white-space:nowrap}
#tt .ttv{font-size:10px;font-weight:500;color:rgba(255,255,255,.70);text-align:right}
#tt .ttd{margin-top:7px;font-size:9.5px;color:rgba(255,255,255,.48);border-top:1px solid rgba(255,255,255,.07);padding-top:7px;line-height:1.55}
/* missing-deployment fallback */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;gap:14px}
.empty h1{font-size:18px;font-weight:700;color:var(--hi);letter-spacing:.02em}
.empty p{font-size:12px;color:var(--md);max-width:520px;line-height:1.6}
.empty a{padding:8px 18px;border-radius:8px;background:var(--accd);border:1px solid rgba(56,189,248,.4);color:var(--acc);text-decoration:none;font-weight:700;font-size:11px;letter-spacing:.06em;text-transform:uppercase}
</style>
</head>
<body>
<div class="page">
<header class="topbar">
  <span class="tb-logo">OpenOva</span>
  <div class="tb-sep"></div>
  <div><div class="tb-org" id="tb-org">—</div><div class="tb-meta" id="tb-meta">awaiting backend stream</div></div>
  <div class="tb-r">
    <div class="pill" id="status-pill"><div class="pdot"></div><span class="pill-t" id="status-pill-t">Connecting</span></div>
    <div class="prog-w"><div class="prog-b"><div class="prog-f" id="prog-f"></div></div><span class="prog-p" id="prog-p">0%</span><span class="prog-t" id="prog-t">0s</span></div>
    <a class="ibtn cta" id="cta-console" style="display:none" target="_blank" rel="noopener">Open Console →</a>
    <button class="ibtn" onclick="toggleSB()" title="Toggle sidebar">⊟</button>
    <button class="ibtn" onclick="toggleLog()" title="Toggle log panel">⊞</button>
    <button class="ibtn" onclick="toggleTheme()" id="tbtn" title="Toggle theme">☀</button>
  </div>
</header>
<div class="body" id="body">
<aside class="sidebar" id="sb"><div class="sb-in" id="sb-in"></div></aside>
<div class="dag-panel">
  <div class="dag-graph">
    <svg id="gsvg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" preserveAspectRatio="xMidYMid meet">
      <defs>
        <marker id="m-done" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M0,1L7,4L0,7Z" fill="rgba(167,243,208,.55)"/></marker>
        <marker id="m-act"  viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M0,1L7,4L0,7Z" fill="rgba(186,230,253,.65)"/></marker>
        <marker id="m-wait" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M0,1L7,4L0,7Z" fill="rgba(148,163,184,.40)"/></marker>
        <marker id="m-fail" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M0,1L7,4L0,7Z" fill="rgba(248,113,113,.65)"/></marker>
      </defs>
      <g id="L-edges"></g>
      <g id="L-nodes"></g>
    </svg>
  </div>
</div>
<div class="log-panel" id="lp">
  <div class="lp-in">
    <div class="lhdr"><span class="llbl">Live Log</span><span class="lchip" id="lchip">—</span><span class="lstat" id="lstat"></span></div>
    <div class="lstream" id="lstream"><div class="lempty">Waiting for the catalyst-api SSE stream to send the first event…</div></div>
  </div>
</div>
</div>
</div>
<div id="tt"></div>
<!-- catalog.js is emitted by scripts/build-catalog.mjs at build time. It
     populates window.CATALYST_CATALOG = { components, bootstrapKit }. -->
<script src="catalog.js"></script>
<script src="provision.js"></script>
</body>
</html>
