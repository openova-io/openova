server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Hashed Astro assets — immutable, cache forever.
    # The ingress strips /nova/ before requests reach nginx, so paths here
    # are relative to dist/ root.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Other static assets
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # HTML pages — always revalidate so new asset hashes are picked up
    absolute_redirect off;
    port_in_redirect off;
    location / {
        add_header Cache-Control "no-cache";
        # Try file first, then <path>/index.html (handles /apps, /billing, …
        # without issuing a trailing-slash redirect that would strip the
        # ingress's re-added /nova prefix), then SPA fallback.
        try_files $uri $uri/index.html /index.html;
    }

    location /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
