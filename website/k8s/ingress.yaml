apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openova-website
spec:
  parentRefs:
    - name: main-gateway
      namespace: gateway
  hostnames:
    - openova.io
    - www.openova.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: openova-website
          port: 80
