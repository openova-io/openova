apiVersion: apps/v1
kind: Deployment
metadata:
  name: openova-website
  labels:
    app.kubernetes.io/name: openova-website
    app.kubernetes.io/component: website
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: openova-website
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openova-website
    spec:
      containers:
        - name: website
          image: registry.openova.io/openova/website:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1001
