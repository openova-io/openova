apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vcluster
  namespace: tenant-bakkal
spec:
  interval: 10m
  chart:
    spec:
      chart: vcluster
      version: "0.33.*"
      sourceRef:
        kind: HelmRepository
        name: loft
        namespace: vcluster-system
  values:
    controlPlane:
      distro:
        k8s:
          enabled: true
      backingStore:
        database:
          embedded:
            enabled: true
      statefulSet:
        image:
          registry: ghcr.io
          repository: loft-sh/vcluster-oss
        resources:
          requests:
            cpu: 100m
            memory: 192Mi
          limits:
            cpu: 2000m
            memory: 2Gi
        persistence:
          volumeClaim:
            size: 5Gi
      service:
        enabled: true
        spec:
          type: ClusterIP
    exportKubeConfig:
      context: vcluster
      server: https://vcluster.tenant-bakkal:443
      insecure: false
      additionalSecrets:
        - name: vc-vcluster
          server: https://vcluster.tenant-bakkal:443
          insecure: false
          context: vcluster
    sync:
      toHost:
        services:
          enabled: true
        ingresses:
          enabled: false
      fromHost:
        ingressClasses:
          enabled: true
