apiVersion: v2
name: bp-external-dns
version: 1.0.0
description: |
  Catalyst-curated Blueprint wrapper for ExternalDNS. Carries Catalyst-specific
  values.yaml on top of the upstream external-dns Helm chart; the bootstrap-kit
  installer (products/catalyst/bootstrap/api/internal/bootstrap/) reads the
  upstream chart reference from values.yaml's metadata block and applies the
  values overlay at helm install time.

  ExternalDNS synchronizes Kubernetes Gateway/Service/Ingress resources with
  cloud DNS providers (Cloudflare, Hetzner DNS, Route53, GCP, Azure, Dynadot
  via the Catalyst webhook), and pairs with k8gb for GSLB delegation per
  platform/external-dns/README.md.
type: application
keywords: [catalyst, blueprint, external-dns, dns]
maintainers:
  - name: OpenOva Catalyst
    email: catalyst@openova.io
