apiVersion: catalyst.openova.io/v1alpha1
kind: Blueprint
metadata:
  name: bp-crossplane
  labels:
    catalyst.openova.io/section: pts-3-2-gitops-and-iac
spec:
  version: 1.1.3
  card:
    title: crossplane
    summary: |
      Crossplane core + provider-hcloud (controller-only payload). The
      compose.openova.io/v1alpha1 XRDs and default Compositions ship in a
      sibling Blueprint, bp-crossplane-claims, which depends on this one
      via Flux HelmRelease `dependsOn` so the apiextensions.crossplane.io
      CRDs registered here are live before the XRDs/Compositions apply.
      Split rationale: a single Helm release cannot install a CRD AND a
      CR of that CRD's kind in the same apply pass.
  visibility: unlisted              # mandatory infra, auto-installed by bootstrap kit
  manifests:
    chart: ./chart
  depends: []
