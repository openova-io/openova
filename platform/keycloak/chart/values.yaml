# Catalyst Blueprint wrapper metadata — read by the bootstrap-kit installer.
# The installer combines the upstream chart reference below with the values
# overlay also in this file when running 'helm install'.

catalystBlueprint:
  upstream: { chart: keycloak, version: "24.7.1", repo: "https://charts.bitnami.com/bitnami" }

# Catalyst-curated keycloak values per platform/keycloak/README.md.
# Generated by docs/PROVISIONING-PLAN.md tickets [F] chart Pass 105+.

auth:
  adminUser: admin
production: true
proxy: edge
postgresql:
  enabled: true
  auth:
    username: keycloak
    database: keycloak
ingress:
  enabled: false  # Catalyst uses Cilium Gateway, not the chart ingress
resources:
  requests: { cpu: 250m, memory: 512Mi }
  limits: { memory: 2Gi }
