# Catalyst Blueprint wrapper metadata — read by the bootstrap-kit installer.
# The installer combines the upstream chart reference below with the values
# overlay also in this file when running 'helm install'.

catalystBlueprint:
  upstream: { chart: spire, version: "0.21.0", repo: "https://spiffe.github.io/helm-charts-hardened" }

# Catalyst-curated spire values per platform/spire/README.md.
# Generated by docs/PROVISIONING-PLAN.md tickets [F] chart Pass 105+.

global:
  spire:
    clusterName: catalyst
    trustDomain: catalyst.local
spire-server:
  ca_subject:
    country: DE
    organization: OpenOva Catalyst
    common_name: SPIRE CA
spire-agent:
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { memory: 256Mi }
