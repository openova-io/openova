# Catalyst Blueprint wrapper metadata — read by the bootstrap-kit installer.
# The installer combines the upstream chart reference below with the values
# overlay also in this file when running 'helm install'.

catalystBlueprint:
  upstream: { chart: openbao, version: "0.16.0", repo: "https://openbao.github.io/openbao-helm" }

# Catalyst-curated openbao values per platform/openbao/README.md.
# Generated by docs/PROVISIONING-PLAN.md tickets [F] chart Pass 105+.

server:
  ha:
    enabled: true
    replicas: 3
    raft:
      enabled: true
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { memory: 512Mi }
  dataStorage:
    size: 10Gi
ui:
  enabled: true
