# Catalyst Blueprint wrapper metadata — read by the bootstrap-kit installer.
# The installer combines the upstream chart reference below with the values
# overlay also in this file when running 'helm install'.

catalystBlueprint:
  upstream: { chart: gitea, version: "10.5.0", repo: "https://dl.gitea.com/charts" }

# Catalyst-curated gitea values per platform/gitea/README.md.
# Generated by docs/PROVISIONING-PLAN.md tickets [F] chart Pass 105+.

gitea:
  admin:
    username: gitea_admin
    email: gitea-admin@catalyst.local
  config:
    APP_NAME: Catalyst Gitea
    server:
      DOMAIN: gitea.catalyst.local
      ROOT_URL: https://gitea.catalyst.local
postgresql-ha:
  enabled: false
postgresql:
  enabled: true
  global:
    postgresql:
      auth:
        username: gitea
        database: gitea
redis-cluster:
  enabled: false
valkey-cluster:
  enabled: false
persistence:
  enabled: true
  size: 20Gi
