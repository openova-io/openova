apiVersion: catalyst.openova.io/v1alpha1
kind: Blueprint
metadata:
  name: bp-cert-manager
  labels:
    catalyst.openova.io/section: pts-3-3-security-and-policy
spec:
  version: 1.0.0
  card:
    title: cert-manager
    summary: TLS certificate automation. Lets Encrypt issuer with Dynadot DNS-01 for omani.works pool, HTTP-01 for BYO domains.
  visibility: unlisted              # mandatory infra, auto-installed by bootstrap kit
  manifests:
    chart: ./chart
  depends: []
  # outputs — resources this Blueprint advertises to downstream Blueprints
  # via the Catalyst manifest-resolver. Per docs/BLUEPRINT-AUTHORING.md,
  # downstream charts (per-component Certificates, Gateway listeners, etc.)
  # reference these by name without hardcoding the issuer kind / API group.
  # Closes #113 outputs section.
  outputs:
    issuers:
      - name: letsencrypt-dns01-prod
        kind: ClusterIssuer
        apiGroup: cert-manager.io
        # Wildcard-capable. Gated on .Values.catalystIssuer.dns01.enabled
        # in chart values; off by default until the Dynadot webhook
        # Blueprint ships (separate follow-up issue).
        capabilities: [wildcard, dns01]
      - name: letsencrypt-http01-prod
        kind: ClusterIssuer
        apiGroup: cert-manager.io
        # Non-wildcard, always-on. Default issuer for per-component
        # certificates (console., gitea., harbor., admin., api.).
        capabilities: [http01]
        default: true
